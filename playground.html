<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matter.js Interactive Playground</title>
<style>
  :root { --bg:#0f1117; --panel:#1a1d27; --fg:#e7e9ef; --muted:#8b90a3; --accent:#4dd0e1; --border:#2a2e3b; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--fg); overflow:hidden; }
  #wrap { display:flex; height:100vh; }
  #panel { width:280px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
    padding:18px; overflow-y:auto; }
  #panel h1 { font-size:1.1rem; margin:0 0 4px; }
  #panel .sub { color:var(--muted); font-size:12px; margin:0 0 18px; line-height:1.4; }
  .group { margin-bottom:20px; }
  .group h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
    margin:0 0 8px; border-bottom:1px solid var(--border); padding-bottom:5px; }
  button.scene { display:block; width:100%; text-align:left; background:#232735; color:var(--fg);
    border:1px solid var(--border); border-radius:7px; padding:9px 12px; margin-bottom:7px; cursor:pointer; font-size:13px; }
  button.scene:hover { border-color:var(--accent); }
  button.scene.active { background:var(--accent); color:#0f1117; font-weight:600; border-color:var(--accent); }
  label.ctrl { display:block; font-size:12px; color:var(--muted); margin:12px 0 4px; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .row { display:flex; gap:8px; margin-top:8px; }
  .row button { flex:1; background:#232735; color:var(--fg); border:1px solid var(--border);
    border-radius:7px; padding:8px; cursor:pointer; font-size:13px; }
  .row button:hover { border-color:var(--accent); }
  #stage { flex:1; position:relative; }
  #hud { position:absolute; top:10px; right:14px; font-size:12px; color:var(--muted);
    background:rgba(15,17,23,.7); padding:5px 10px; border-radius:6px; pointer-events:none; }
  canvas { display:block; }
  a { color:var(--accent); }
  .foot { font-size:11px; color:var(--muted); margin-top:24px; line-height:1.5; }
</style>
</head>
<body>
<div id="wrap">
  <div id="panel">
    <h1>Matter.js Playground</h1>
    <p class="sub">Click a scene, then drag bodies with the mouse. Tune gravity and try presets live.</p>

    <div class="group">
      <h2>Scenes</h2>
      <button class="scene" data-scene="stack">Falling stack</button>
      <button class="scene" data-scene="pyramid">Pyramid</button>
      <button class="scene" data-scene="pendulum">Newton's cradle</button>
      <button class="scene" data-scene="cloth">Chain bridge</button>
      <button class="scene" data-scene="mixed">Bouncy mix</button>
    </div>

    <div class="group">
      <h2>Physics</h2>
      <label class="ctrl">Gravity Y: <span id="gval">1.0</span></label>
      <input type="range" id="gravity" min="-1" max="2" step="0.05" value="1">
      <label class="ctrl">Restitution (bounce): <span id="rval">0.3</span></label>
      <input type="range" id="rest" min="0" max="1" step="0.05" value="0.3">
      <div class="row">
        <button id="reset">Reset scene</button>
        <button id="rain">Drop 20</button>
      </div>
    </div>

    <p class="foot">
      Built on <a href="https://github.com/liabru/matter-js" target="_blank" rel="noopener">matter-js</a> v0.20 (MIT).
      Interactive playground added in this fork.
    </p>
  </div>
  <div id="stage">
    <div id="hud">bodies: 0</div>
  </div>
</div>

<script src="build/matter.min.js"></script>
<script>
(function(){
  var Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
      Bodies = Matter.Bodies, Composite = Matter.Composite, Composites = Matter.Composites,
      Constraint = Matter.Constraint, Mouse = Matter.Mouse, MouseConstraint = Matter.MouseConstraint,
      Common = Matter.Common, Body = Matter.Body;

  var stage = document.getElementById('stage');
  var hud = document.getElementById('hud');
  var engine = Engine.create();
  var world = engine.world;

  function dims(){ return { w: stage.clientWidth, h: stage.clientHeight }; }
  var d = dims();

  var render = Render.create({
    element: stage,
    engine: engine,
    options: { width: d.w, height: d.h, wireframes:false, background:'#0f1117' }
  });
  Render.run(render);
  var runner = Runner.create();
  Runner.run(runner, engine);

  var restitution = 0.3;
  var currentScene = 'stack';

  function walls(){
    var d = dims(), t = 60;
    return [
      Bodies.rectangle(d.w/2, d.h+t/2-2, d.w, t, { isStatic:true, render:{fillStyle:'#2a2e3b'} }),
      Bodies.rectangle(-t/2+2, d.h/2, t, d.h, { isStatic:true, render:{fillStyle:'#2a2e3b'} }),
      Bodies.rectangle(d.w+t/2-2, d.h/2, t, d.h, { isStatic:true, render:{fillStyle:'#2a2e3b'} })
    ];
  }

  var palette = ['#4dd0e1','#f06292','#ba68c8','#ffb74d','#81c784','#64b5f6'];
  function color(){ return palette[Math.floor(Math.random()*palette.length)]; }

  function clearWorld(){ Composite.clear(world, false); }

  function addMouse(){
    var mouse = Mouse.create(render.canvas);
    var mc = MouseConstraint.create(engine, { mouse:mouse,
      constraint:{ stiffness:0.2, render:{visible:false} } });
    Composite.add(world, mc);
    render.mouse = mouse;
  }

  function buildScene(name){
    currentScene = name;
    clearWorld();
    var d = dims();
    Composite.add(world, walls());

    if (name === 'stack') {
      var stack = Composites.stack(d.w/2-100, 40, 5, 6, 8, 8, function(x,y){
        return Bodies.rectangle(x,y,30,30,{restitution:restitution, render:{fillStyle:color()}});
      });
      Composite.add(world, stack);
    } else if (name === 'pyramid') {
      var p = Composites.pyramid(d.w/2-150, 40, 9, 9, 0, 0, function(x,y){
        return Bodies.rectangle(x,y,32,32,{restitution:restitution, render:{fillStyle:color()}});
      });
      Composite.add(world, p);
    } else if (name === 'pendulum') {
      var n=5, r=34, sep=r*2, startX=d.w/2-(n-1)*sep/2, y0=90;
      for (var i=0;i<n;i++){
        var bx=startX+i*sep;
        var ball=Bodies.circle(bx, y0+220, r, {inertia:Infinity, restitution:1, friction:0, frictionAir:0, render:{fillStyle:palette[i%palette.length]}});
        var c=Constraint.create({pointA:{x:bx,y:y0}, bodyB:ball, stiffness:1, length:220, render:{strokeStyle:'#555'}});
        Composite.add(world,[ball,c]);
      }
    } else if (name === 'cloth') {
      var bridge = Composites.stack(160, d.h/2, 12, 1, 6, 0, function(x,y){
        return Bodies.rectangle(x,y,44,16,{collisionFilter:{group:Body.nextGroup?Body.nextGroup(true):-1}, chamfer:2, density:0.005, frictionAir:0.02, render:{fillStyle:'#4dd0e1'}});
      });
      Composites.chain(bridge, 0.3, 0, -0.3, 0, {stiffness:0.9, length:0, render:{visible:false}});
      Composite.add(world, [ bridge,
        Constraint.create({pointA:{x:150,y:d.h/2}, bodyB:bridge.bodies[0], pointB:{x:-20,y:0}, stiffness:0.9}),
        Constraint.create({pointA:{x:150+12*44,y:d.h/2}, bodyB:bridge.bodies[bridge.bodies.length-1], pointB:{x:20,y:0}, stiffness:0.9})
      ]);
      for (var k=0;k<4;k++)
        Composite.add(world, Bodies.circle(d.w/2-60+k*40, 60, 22, {restitution:restitution, render:{fillStyle:color()}}));
    } else if (name === 'mixed') {
      for (var m=0;m<14;m++){
        var bx2=Common.random(80,d.w-80), by2=Common.random(40,200);
        var shape = Math.random();
        var b;
        if (shape<0.4) b=Bodies.circle(bx2,by2,Common.random(16,34),{restitution:0.8,render:{fillStyle:color()}});
        else if (shape<0.7) b=Bodies.rectangle(bx2,by2,Common.random(30,60),Common.random(30,60),{restitution:0.6,render:{fillStyle:color()}});
        else b=Bodies.polygon(bx2,by2,Math.floor(Common.random(3,7)),Common.random(20,36),{restitution:0.7,render:{fillStyle:color()}});
        Composite.add(world,b);
      }
    }
    addMouse();
  }

  function dropMany(){
    var d = dims();
    for (var i=0;i<20;i++){
      var b=Bodies.circle(Common.random(60,d.w-60), -Common.random(0,300), Common.random(12,26),
        {restitution:restitution, render:{fillStyle:color()}});
      Composite.add(world,b);
    }
  }

  // Controls
  var gEl=document.getElementById('gravity'), gVal=document.getElementById('gval');
  gEl.addEventListener('input',function(){ world.gravity.y=parseFloat(this.value); gVal.textContent=parseFloat(this.value).toFixed(2); });
  var rEl=document.getElementById('rest'), rVal=document.getElementById('rval');
  rEl.addEventListener('input',function(){ restitution=parseFloat(this.value); rVal.textContent=restitution.toFixed(2);
    Composite.allBodies(world).forEach(function(b){ if(!b.isStatic) b.restitution=restitution; }); });
  document.getElementById('reset').addEventListener('click',function(){ buildScene(currentScene); });
  document.getElementById('rain').addEventListener('click', dropMany);

  document.querySelectorAll('button.scene').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('button.scene').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      buildScene(btn.dataset.scene);
    });
  });

  // HUD
  setInterval(function(){ hud.textContent='bodies: '+Composite.allBodies(world).length; }, 300);

  // Resize
  window.addEventListener('resize', function(){
    var d = dims();
    render.canvas.width=d.w; render.canvas.height=d.h;
    render.options.width=d.w; render.options.height=d.h;
    buildScene(currentScene);
  });

  // Start
  document.querySelector('button.scene[data-scene="stack"]').classList.add('active');
  buildScene('stack');
})();
</script>
</body>
</html>
